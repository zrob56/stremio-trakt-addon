            const [feedingLoaded, setFeedingLoaded] = useState(false);
            const [feedingMediaTab, setFeedingMediaTab] = useState('movies');
            const [excludedFromFeed, setExcludedFromFeed] = useState(() => {
                try { return JSON.parse(localStorage.getItem('trakt_config') || '{}').excludedFromFeed || []; } catch { return []; }
            });

            const config = { accessToken: tokens.accessToken, refreshToken: tokens.refreshToken, clientId, clientSecret, ...(geminiKey ? { geminiKey } : {}), ...(customInstructions.trim() ? { customInstructions: customInstructions.trim() } : {}), ...(excludedFromFeed.length > 0 ? { excludedFromFeed } : {}), enabledCatalogs };
            const configEncoded = encodeConfig(config);

            // Push updated config to KV (keeps UUID entry current when settings change)
            const pushToKV = useCallback(async (overrides = {}) => {
                if (!uuid) return;
                try {
                    await fetch('/api/stremio/install', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            uuid,
                            clientId, clientSecret,
                            accessToken: tokens.accessToken,
                            refreshToken: tokens.refreshToken,
                            enabledCatalogs,
                            ...(geminiKey ? { geminiKey } : {}),
                            ...(customInstructions.trim() ? { customInstructions: customInstructions.trim() } : {}),
                            ...(excludedFromFeed.length > 0 ? { excludedFromFeed } : {}),
                            ...(traktLists.length > 0 ? { traktLists } : {}),
                            ...overrides,
                        }),
                    });
                } catch { /* non-fatal */ }
            }, [uuid, clientId, clientSecret, tokens, geminiKey, enabledCatalogs, customInstructions, excludedFromFeed, traktLists]);

            // Sync excludedFromFeed from KV on mount (so a fresh browser gets the server state)
            useEffect(() => {
                if (!uuid) return;
                (async () => {
                    try {
                        const r = await fetch(`/api/stremio/install?uuid=${uuid}`);
                        if (!r.ok) return;
                        const data = await r.json();
                        if (data.excludedFromFeed?.length) {
                            setExcludedFromFeed(prev => {
                                const merged = [...new Set([...prev, ...data.excludedFromFeed])];
                                try {
                                    const saved = JSON.parse(localStorage.getItem('trakt_config') || '{}');
                                    saved.excludedFromFeed = merged;
                                    localStorage.setItem('trakt_config', JSON.stringify(saved));
                                } catch {}
                                return merged;
                            });
                        }
                    } catch { /* non-fatal */ }
                })();
            }, []); // eslint-disable-line react-hooks/exhaustive-deps

            // Generate UUID if we don't have one yet (e.g. returning user on old base64 URL)
            useEffect(() => {
                if (uuid) return;
                (async () => {
                    try {
                        const r = await fetch('/api/stremio/install', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                clientId, clientSecret,
                                accessToken: tokens.accessToken,
                                refreshToken: tokens.refreshToken,
                                enabledCatalogs,
                                ...(geminiKey ? { geminiKey } : {}),
                                ...(traktLists.length > 0 ? { traktLists } : {}),
                            }),
                        });
                        if (r.ok) {
                            const { uuid: newUuid, manageKey: newManageKey } = await r.json();
                            onUuidSet?.(newUuid, newManageKey || null);
                        }
                    } catch { /* non-fatal */ }
                })();
            }, []); // eslint-disable-line react-hooks/exhaustive-deps

            // Sequential AI catalog pre-warm — respects Gemini 5 RPM free tier
            const startPrewarm = useCallback(async (prewarmUuid, catalogIds) => {
                for (let i = 0; i < catalogIds.length; i++) {
                    const parts = catalogIds[i].split('-');
                    const type  = parts[1]; // 'movie' | 'show'
                    const genre = parts.slice(2).join('-');
                    try {
                        await fetch(`/api/stremio/prewarm?uuid=${prewarmUuid}&type=${type}&genre=${genre}`);
                    } catch { /* non-fatal */ }
                    setPrewarmProgress({ done: i + 1, total: catalogIds.length });
                    await new Promise(r => setTimeout(r, 15000));
                }
                setTimeout(() => setPrewarmProgress(null), 3000);
            }, []);

            // Trigger once when uuid is first available (fresh install or returning user first visit)
            useEffect(() => {
                if (!uuid || prewarmStarted.current) return;
                prewarmStarted.current = true;
                const aiCatalogs = enabledCatalogs.filter(id =>
                    (id.startsWith('ai-movie-') || id.startsWith('ai-show-')) && !id.includes('search')
                );
                if (aiCatalogs.length === 0 || !geminiKey) return;
                startPrewarm(uuid, aiCatalogs);
            }, [uuid]); // eslint-disable-line react-hooks/exhaustive-deps

            // Persist catalog changes to Redis whenever enabledCatalogs changes
            useEffect(() => {
                if (!uuid) return;
                const t = setTimeout(() => pushToKV(), 500);
                return () => clearTimeout(t);
            }, [enabledCatalogs, traktLists, pushToKV]);

            const saveGeminiKey = useCallback(async () => {
                const key = geminiKey.trim();
                if (key) {
                    setToast({ message: 'Validating key…', type: 'info' });
                    try {
                        const { allOk, badKey, brokenModels } = await validateGeminiKey(key);
                        if (badKey) {
                            setToast({ message: 'Invalid Gemini key — check and try again', type: 'error' });
                            return;
                        }
                        if (brokenModels.length > 0) {
                            setToast({ message: 'Key saved — note: search model may be unavailable', type: 'success' });
                        } else if (allOk) {
                            setToast({ message: 'Gemini key saved — reinstall addon to activate AI Picks', type: 'success' });
                        } else {
                            setToast({ message: 'Key saved (validation inconclusive)', type: 'success' });
                        }
                    } catch {
                        setToast({ message: 'Gemini key saved — reinstall addon to activate AI Picks', type: 'success' });
                    }
                }
                try {
                    const saved = JSON.parse(localStorage.getItem('trakt_config') || '{}');
                    saved.geminiKey = key;
                    localStorage.setItem('trakt_config', JSON.stringify(saved));
                    setGeminiSaved(true);
                    if (!key) setToast({ message: 'Gemini key removed', type: 'success' });
                    setTimeout(() => setGeminiSaved(false), 2000);
                    pushToKV({ geminiKey: key || undefined });
                } catch {}
            }, [geminiKey, pushToKV]);

            const saveCustomInstructions = useCallback(() => {
                try {
                    const saved = JSON.parse(localStorage.getItem('trakt_config') || '{}');
                    saved.customInstructions = customInstructions.trim();
                    localStorage.setItem('trakt_config', JSON.stringify(saved));
                    pushToKV({ customInstructions: customInstructions.trim() || undefined });
                    setInstrSaved(true);
                    setTimeout(() => setInstrSaved(false), 2000);
                } catch {}
            }, [customInstructions, pushToKV]);

            const loadFeedingData = useCallback(async () => {
                if (feedingLoaded) return;
                setFeedingLoaded(true);
                const h = {
                    'Content-Type': 'application/json',
                    'trakt-api-version': '2',
                    'trakt-api-key': clientId,
                    'Authorization': `Bearer ${tokens.accessToken}`,
                };
                try {
                    const [mRatRes, mWatRes, mWlRes, sRatRes, sWatRes, sWlRes] = await Promise.all([
                        fetch('https://api.trakt.tv/users/me/ratings/movies?limit=100&extended=full', { headers: h }),
                        fetch('https://api.trakt.tv/users/me/watched/movies?limit=100', { headers: h }),
                        fetch('https://api.trakt.tv/sync/watchlist/movies?limit=100&extended=full', { headers: h }),
                        fetch('https://api.trakt.tv/users/me/ratings/shows?limit=100&extended=full', { headers: h }),
                        fetch('https://api.trakt.tv/users/me/watched/shows?limit=100', { headers: h }),
                        fetch('https://api.trakt.tv/sync/watchlist/shows?limit=100&extended=full', { headers: h }),
                    ]);
                    const [mRat, mWat, mWl, sRat, sWat, sWl] = await Promise.all([
                        mRatRes.ok ? mRatRes.json() : [],
                        mWatRes.ok ? mWatRes.json() : [],
                        mWlRes.ok  ? mWlRes.json()  : [],
                        sRatRes.ok ? sRatRes.json() : [],
                        sWatRes.ok ? sWatRes.json() : [],
                        sWlRes.ok  ? sWlRes.json()  : [],
                    ]);
                    const mRatedTitles = new Set(mRat.map(r => r.movie.title));
                    const sRatedTitles = new Set(sRat.map(r => r.show.title));
                    setFeedingData({
                        movies: {
                            rated:     mRat.filter(r => r.rating >= 7).sort((a,b) => b.rating - a.rating).map(r => ({ title: r.movie.title, year: r.movie.year, rating: r.rating })),
                            watched:   mWat.filter(w => !mRatedTitles.has(w.movie.title)).map(w => ({ title: w.movie.title, year: w.movie.year })),
                            watchlist: mWl.map(w => ({ title: w.movie.title, year: w.movie.year })),
                        },
                        shows: {
                            rated:     sRat.filter(r => r.rating >= 7).sort((a,b) => b.rating - a.rating).map(r => ({ title: r.show.title, year: r.show.year, rating: r.rating })),
                            watched:   sWat.filter(w => !sRatedTitles.has(w.show.title)).map(w => ({ title: w.show.title, year: w.show.year })),
                            watchlist: sWl.map(w => ({ title: w.show.title, year: w.show.year })),
                        },
                    });
                } catch {}
            }, [clientId, tokens.accessToken, feedingLoaded]);

            const excludeTitle = useCallback((title) => {
                setExcludedFromFeed(prev => {
                    const next = [...prev, title];
                    try {
                        const saved = JSON.parse(localStorage.getItem('trakt_config') || '{}');
                        saved.excludedFromFeed = next;
                        localStorage.setItem('trakt_config', JSON.stringify(saved));
                    } catch {}
                    return next;
                });
            }, []);

            const activeConfig = uuid || configEncoded;
            const manifestUrl = `${window.location.origin}/stremio/${activeConfig}/manifest.json`;

            const copyUrl = useCallback(() => {
                navigator.clipboard.writeText(manifestUrl);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            }, [manifestUrl]);

            const tabs = [
                { id: 'catalogs', label: 'Catalogs', icon: 'LayoutGrid' },
                { id: 'search', label: 'Search & Rate', icon: 'Search' },
                { id: 'watchlist', label: 'Watchlist', icon: 'Bookmark' },
            ];

            return (
                <div className="space-y-6 animate-fade-in">
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}

                    <button onClick={onBack} className="text-neutral-500 hover:text-neutral-300 text-sm flex items-center gap-1 transition">
                        <Icon name="ArrowLeft" size={14} /> Back
                    </button>

                    {/* Header */}
                    <div className="flex items-center justify-between">
                        <div>
                            <h1 className="text-xl font-bold text-white">Trakt Recommendations</h1>
                            <p className="text-sm text-neutral-400 mt-0.5">Curate your recommendations</p>
                        </div>
                        <button
                            onClick={onReauth}
                            className="text-neutral-500 hover:text-red-400 text-xs flex items-center gap-1 transition"
                        >
                            <Icon name="LogOut" size={14} /> Re-authorize
                        </button>
                    </div>

                    {/* Manifest URL */}
                    <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-4 space-y-2">
                        <p className="text-xs text-neutral-400 font-medium">Addon manifest URL</p>
                        <div className="relative">
                            <input
                                type="text"
                                readOnly
                                value={manifestUrl}
                                className="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 pr-16 text-xs text-neutral-300 font-mono"
                                onClick={e => e.target.select()}
                            />
                            <button
                                onClick={copyUrl}
                                className="absolute right-2 top-1/2 -translate-y-1/2 bg-neutral-700 hover:bg-neutral-600 text-white rounded px-2 py-1 text-xs transition flex items-center gap-1"
                            >
                                <Icon name={copied ? 'Check' : 'Copy'} size={11} />
                                {copied ? 'Copied' : 'Copy'}
                            </button>
                        </div>
                    </div>

                    {/* AI catalog pre-warm progress */}
                    {prewarmProgress && prewarmProgress.done < prewarmProgress.total && (
                        <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-4">
                            <div className="flex items-center gap-3">
                                <div className="w-4 h-4 border-2 border-trakt-500/30 border-t-trakt-500 rounded-full spinner flex-shrink-0" />
                                <div className="flex-1">
                                    <p className="text-sm text-neutral-300 font-medium">Setting up AI catalogs...</p>
                                    <p className="text-xs text-neutral-500 mt-0.5">({prewarmProgress.done} / {prewarmProgress.total}) — they'll load instantly in Stremio</p>
                                </div>
                            </div>
                            <div className="mt-3 h-1 bg-neutral-800 rounded-full overflow-hidden">
                                <div
                                    className="h-full bg-trakt-500 rounded-full transition-all duration-500"
                                    style={{ width: `${(prewarmProgress.done / prewarmProgress.total) * 100}%` }}
                                />
                            </div>
                        </div>
                    )}
                    {prewarmProgress && prewarmProgress.done === prewarmProgress.total && (
                        <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-4 flex items-center gap-3">
                            <Icon name="CheckCircle" size={18} className="text-emerald-400 flex-shrink-0" />
                            <div>
                                <p className="text-sm text-emerald-300 font-medium">AI catalogs ready</p>
                                <p className="text-xs text-neutral-500">All {prewarmProgress.total} catalog{prewarmProgress.total !== 1 ? 's' : ''} cached and ready to load in Stremio</p>
                            </div>
                        </div>
                    )}

                    {/* Gemini Key */}
                    <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-4 space-y-2">
                        <p className="text-xs text-neutral-400 font-medium">Gemini API Key <span className="text-neutral-600">(optional — enables AI Picks catalog)</span></p>
                        <div className="flex gap-2">
                            <input
                                type="password"
                                value={geminiKey}
                                onChange={e => setGeminiKey(e.target.value)}
                                placeholder="Paste Gemini API key..."
                                className="flex-1 bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-xs text-white placeholder-neutral-500 focus:outline-none focus:border-trakt-500 font-mono transition"
                            />
                            <button
                                onClick={saveGeminiKey}
                                className="bg-trakt-600 hover:bg-trakt-700 text-white rounded-lg px-3 py-2 text-xs transition flex items-center gap-1"
                            >
                                <Icon name={geminiSaved ? 'Check' : 'Save'} size={12} />
                                {geminiSaved ? 'Saved' : 'Save'}
                            </button>
                        </div>
                        <p className="text-xs text-neutral-600">Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" className="text-trakt-400/70 hover:text-trakt-300 underline">aistudio.google.com</a>. After saving, reinstall the addon in Stremio to see AI Picks.</p>
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-1 bg-neutral-900 border border-neutral-800 rounded-xl p-1">
                        {tabs.map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition ${
                                    activeTab === tab.id ? 'bg-trakt-600 text-white' : 'text-neutral-400 hover:text-neutral-200'
                                }`}
                            >
                                <Icon name={tab.icon} size={14} /> {tab.label}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'search' && (
                        <SearchTab clientId={clientId} tokens={tokens} />
                    )}
                    {activeTab === 'watchlist' && (
                        <WatchlistTab clientId={clientId} tokens={tokens} uuid={uuid} manageKey={manageKey} />
                    )}
                    {activeTab === 'catalogs' && (
                        <div className="space-y-6">
                            <CatalogToggleList
                                enabledCatalogs={enabledCatalogs}
                                setEnabledCatalogs={onCatalogsChange}
                                geminiKey={geminiKey}
                                traktLists={traktLists}
                                traktListsLoading={traktListsLoading}
                            />

                            {/* Custom AI instructions */}
                            <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-4 space-y-2">
                                <label className="text-xs font-medium text-neutral-300">
                                    Custom AI instructions <span className="text-neutral-600 font-normal">(optional)</span>
                                </label>
                                <textarea
                                    value={customInstructions}
                                    onChange={e => setCustomInstructions(e.target.value)}
                                    onBlur={saveCustomInstructions}
                                    placeholder="e.g. prefer foreign films, avoid sequels, only post-2000..."
                                    rows={2}
                                    className="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-xs text-white placeholder-neutral-500 focus:outline-none focus:border-trakt-500 resize-none transition"
                                />
                                {instrSaved
                                    ? <p className="text-xs text-emerald-500">Saved ✓</p>
                                    : <p className="text-xs text-neutral-600">Saved on blur. Copy the updated manifest URL and reinstall to apply.</p>
                                }
                            </div>

                            {/* What's feeding the AI */}
                            <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-4">
                                <button
                                    onClick={() => { setFeedingOpen(o => !o); if (!feedingOpen) loadFeedingData(); }}
                                    className="w-full flex items-center gap-2 text-xs font-medium text-neutral-400 hover:text-neutral-200 transition"
                                >
                                    <Icon name={feedingOpen ? 'ChevronDown' : 'ChevronRight'} size={12} />
                                    What's feeding the AI
                                    {excludedFromFeed.length > 0 && <span className="text-red-500/70 font-normal">({excludedFromFeed.length} excluded)</span>}
                                </button>
                                {feedingOpen && (() => {
                                    const excluded = new Set(excludedFromFeed);
                                    const tab = feedingData[feedingMediaTab];
                                    const sections = [
                                        { label: 'Highly rated', icon: 'Star', items: tab.rated.filter(i => !excluded.has(i.title)), right: item => <span className="text-amber-400 font-medium">{item.rating}/10</span> },
                                        { label: 'Watch history', icon: 'Eye',  items: tab.watched.filter(i => !excluded.has(i.title)),   right: () => null },
                                        { label: 'Watchlist',     icon: 'Bookmark', items: tab.watchlist.filter(i => !excluded.has(i.title)), right: () => null },
                                    ];
                                    const total = sections.reduce((n, s) => n + s.items.length, 0);
                                    return (
                                        <div className="mt-3 space-y-3">
                                            {/* Movies / Shows tab */}
                                            <div className="flex gap-1 bg-neutral-800 rounded-lg p-0.5">
                                                {[['movies','Film'],['shows','Tv']].map(([id, icon]) => (
                                                    <button key={id} onClick={() => setFeedingMediaTab(id)}
                                                        className={`flex-1 flex items-center justify-center gap-1 py-1.5 rounded-md text-xs font-medium transition ${feedingMediaTab === id ? 'bg-neutral-700 text-white' : 'text-neutral-500 hover:text-neutral-300'}`}>
                                                        <Icon name={icon} size={11} />{id.charAt(0).toUpperCase() + id.slice(1)}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="space-y-3 max-h-72 overflow-y-auto">
                                                {sections.map(({ label, icon, items, right }) => items.length > 0 && (
                                                    <div key={label}>
                                                        <div className="flex items-center gap-1.5 mb-1.5 sticky top-0 bg-neutral-900 py-0.5">
                                                            <Icon name={icon} size={11} className="text-neutral-500" />
                                                            <span className="text-xs font-medium text-neutral-500 uppercase tracking-wide">{label} ({items.length})</span>
                                                        </div>
                                                        <div className="space-y-1">
                                                            {items.map((item, i) => (
                                                                <div key={i} className="flex items-center gap-2 px-2 py-1.5 rounded bg-neutral-800/50 text-xs group">
                                                                    <span className="text-neutral-300 truncate flex-1">{item.title} <span className="text-neutral-600">({item.year})</span></span>
                                                                    {right(item)}
                                                                    <button onClick={() => excludeTitle(item.title)} className="opacity-0 group-hover:opacity-100 text-neutral-600 hover:text-red-400 transition flex-shrink-0" title="Remove from AI input">
                                                                        <Icon name="X" size={11} />
                                                                    </button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                                {total === 0 && <p className="text-xs text-neutral-600 text-center py-4">Nothing here yet.</p>}
                                            </div>
                                            <p className="text-xs text-neutral-600">X removes a title from the AI's positive signal. Copy the updated manifest URL and reinstall to apply.</p>
                                        </div>
                                    );
                                })()}
                            </div>

                            <p className="text-xs text-neutral-500 text-center">
                                After changing catalogs, copy the updated manifest URL above and reinstall the addon in Stremio.
                            </p>
                        </div>
                    )}
                </div>
            );
        }

        // ─── App ────────────────────────────────────────────────────
        function App() {
            const [step, setStep] = useState(1);
            const [clientId, setClientId] = useState('');
            const [clientSecret, setClientSecret] = useState('');
            const [geminiKey, setGeminiKey] = useState('');
            const [customInstructions, setCustomInstructions] = useState('');
            const [tokens, setTokens] = useState(null);
            const [enabledCatalogs, setEnabledCatalogs] = useState(DEFAULT_CATALOGS);
            const [uuid, setUuid] = useState(() => {
                try { return localStorage.getItem('trakt_uuid') || null; } catch { return null; }
            });
            const [manageKey, setManageKey] = useState(() => {
                try { return localStorage.getItem('trakt_manage_key') || null; } catch { return null; }
            });
            const [sharedApp, setSharedApp] = useState(false);
            const [traktLists, setTraktLists] = useState([]);
            const [traktListsLoading, setTraktListsLoading] = useState(false);

            useEffect(() => {
                fetch('/api/stremio/config')
                    .then(r => r.json())
                    .then(d => { if (d.sharedApp) { setSharedApp(true); if (d.clientId) setClientId(d.clientId); } })
                    .catch(() => {});
            }, []);

            useEffect(() => {
                if (!tokens?.accessToken || !uuid) return;
                setTraktListsLoading(true);
                fetch(`/api/stremio/trakt-lists?uuid=${uuid}`)
                    .then(r => r.json())
                    .then(data => { if (Array.isArray(data)) setTraktLists(data); })
                    .catch(() => {})
                    .finally(() => setTraktListsLoading(false));
            }, [tokens?.accessToken, uuid]);

            const handleUuidSet = useCallback((newUuid, newManageKey = null) => {
                setUuid(newUuid);
                try { localStorage.setItem('trakt_uuid', newUuid); } catch {}
                if (newManageKey) {
                    setManageKey(newManageKey);
                    try { localStorage.setItem('trakt_manage_key', newManageKey); } catch {}
                }
            }, []);

            // Load saved config from localStorage on mount
            useEffect(() => {
                try {
                    const saved = JSON.parse(localStorage.getItem('trakt_config') || 'null');
                    if (saved && saved.accessToken && saved.clientId) {
                        setClientId(saved.clientId);
                        setClientSecret(saved.clientSecret || '');
                        setGeminiKey(saved.geminiKey || '');
                        setCustomInstructions(saved.customInstructions || '');
                        if (saved.enabledCatalogs?.length) setEnabledCatalogs(saved.enabledCatalogs);
                        setTokens({ accessToken: saved.accessToken, refreshToken: saved.refreshToken });
                        setStep(5);
                    }
                } catch {}
            }, []);

            const handleAuthComplete = useCallback((t) => {
                try {
                    localStorage.setItem('trakt_config', JSON.stringify({
                        clientId, clientSecret, geminiKey, customInstructions, enabledCatalogs,
                        accessToken: t.accessToken,
                        refreshToken: t.refreshToken,
                    }));
                } catch {}
                setTokens(t);
                setStep(3);
            }, [clientId, clientSecret, geminiKey, enabledCatalogs]);

            const handleCatalogsChange = useCallback((updater) => {
                setEnabledCatalogs(prev => {
                    const next = typeof updater === 'function' ? updater(prev) : updater;
                    try {
                        const saved = JSON.parse(localStorage.getItem('trakt_config') || '{}');
                        localStorage.setItem('trakt_config', JSON.stringify({ ...saved, enabledCatalogs: next }));
                    } catch {}
                    return next;
                });
            }, []);

            const handleReauth = useCallback(() => {
                if (uuid) {
                    const keyPart = manageKey ? `&k=${encodeURIComponent(manageKey)}` : '';
                    fetch(`/api/stremio/install?uuid=${uuid}${keyPart}`, { method: 'DELETE' }).catch(() => {});
                }
                try { localStorage.removeItem('trakt_config'); localStorage.removeItem('trakt_uuid'); localStorage.removeItem('trakt_manage_key'); } catch {}
                setTokens(null);
                setClientId('');
                setClientSecret('');
                setUuid(null);
                setManageKey(null);
                setStep(1);
            }, [uuid, manageKey]);

            if (step === 5 && tokens) {
                return (
                    <div className="min-h-screen flex items-start justify-center p-4 pt-8">
                        <div className="w-full max-w-2xl">
                            <StepManage
                                clientId={clientId}
                                clientSecret={clientSecret}
                                geminiKey={geminiKey}
                                initialCustomInstructions={customInstructions}
                                tokens={tokens}
                                enabledCatalogs={enabledCatalogs}
                                onCatalogsChange={handleCatalogsChange}
                                onReauth={handleReauth}
                                onBack={() => setStep(4)}
                                uuid={uuid}
                                manageKey={manageKey}
                                onUuidSet={handleUuidSet}
                                traktLists={traktLists}
                                traktListsLoading={traktListsLoading}
                            />
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex items-start justify-center p-4 pt-12">
                    <div className="w-full max-w-2xl">
                        {/* Progress */}
                        <div className="flex items-center justify-center gap-2 mb-8">
                            {[1, 2, 3, 4].map(s => (
                                <React.Fragment key={s}>
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-medium transition ${
                                        step >= s
                                            ? 'bg-trakt-600 text-white'
                                            : 'bg-neutral-800 text-neutral-500'
                                    }`}>
                                        {step > s ? <Icon name="Check" size={14} /> : s}
                                    </div>
                                    {s < 4 && <div className={`w-8 h-px ${step > s ? 'bg-trakt-600' : 'bg-neutral-800'}`} />}
                                </React.Fragment>
                            ))}
                        </div>

                        {step === 1 && (
                            <StepClientId sharedApp={sharedApp} onNext={(id, secret, gkey) => { setClientId(id); setClientSecret(secret); setGeminiKey(gkey || ''); setStep(2); }} />
                        )}

                        {step === 2 && (
                            <StepAuth
                                clientId={clientId}
                                clientSecret={clientSecret}
                                sharedApp={sharedApp}
                                onNext={handleAuthComplete}
                                onBack={() => setStep(1)}
                            />
                        )}

                        {step === 3 && (
                            <StepCurate
                                clientId={clientId}
                                tokens={tokens}
                                onBack={() => setStep(2)}
                                onNext={() => setStep(4)}
                            />
                        )}

                        {step === 4 && (
                            <StepInstall
                                clientId={clientId}
                                clientSecret={clientSecret}
                                geminiKey={geminiKey}
                                tokens={tokens}
                                enabledCatalogs={enabledCatalogs}
                                setEnabledCatalogs={setEnabledCatalogs}
                                onBack={() => setStep(3)}
                                onManage={() => setStep(5)}
                                uuid={uuid}
                                manageKey={manageKey}
                                onUuidSet={handleUuidSet}
                                traktLists={traktLists}
                                traktListsLoading={traktListsLoading}
                            />
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

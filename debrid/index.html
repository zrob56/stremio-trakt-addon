<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0f0f">
    <title>Debrid - Link Unrestrictor & Streamer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        rd: {
                            50: '#eef9ff',
                            100: '#d8f1ff',
                            200: '#b9e8ff',
                            300: '#89dbff',
                            400: '#52c5ff',
                            500: '#2aa6ff',
                            600: '#1488f5',
                            700: '#0d6fe1',
                            800: '#1259b6',
                            900: '#154c8f',
                            950: '#122f57',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; background: #0a0a0a; color: #e5e5e5; }
        #root { min-height: 100vh; }
        * { scrollbar-width: thin; scrollbar-color: #333 transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }

        @keyframes pulse-border { 0%, 100% { border-color: rgba(42, 166, 255, 0.3); } 50% { border-color: rgba(42, 166, 255, 0.7); } }
        .pulse-border { animation: pulse-border 2s ease-in-out infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 0.8s linear infinite; }

        video::-webkit-media-controls { border-radius: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        // ─── API Client ─────────────────────────────────────────────
        const API_BASE = '/api/debrid';

        class RDClient {
            constructor(token) {
                this.token = token;
            }

            async request(path, options = {}) {
                const { method = 'GET', body } = options;
                const headers = { 'X-RD-Token': this.token };

                const fetchOptions = { method, headers };

                if (body && (method === 'POST' || method === 'PUT')) {
                    headers['Content-Type'] = 'application/x-www-form-urlencoded';
                    if (typeof body === 'object') {
                        fetchOptions.body = new URLSearchParams(body).toString();
                    } else {
                        fetchOptions.body = body;
                    }
                }

                const res = await fetch(`${API_BASE}/${path}`, fetchOptions);

                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({}));
                    const error = new Error(errorData.error || `API error ${res.status}`);
                    error.status = res.status;
                    error.data = errorData;
                    throw error;
                }

                const text = await res.text();
                try { return JSON.parse(text); } catch { return text; }
            }

            getUser() { return this.request('user'); }
            getHosts() { return this.request('hosts'); }
            checkLink(link) { return this.request('unrestrict/check', { method: 'POST', body: { link } }); }
            unrestrictLink(link, password) {
                const body = { link };
                if (password) body.password = password;
                return this.request('unrestrict/link', { method: 'POST', body });
            }
            getTranscode(id) { return this.request(`streaming/transcode/${id}`); }
            getMediaInfo(id) { return this.request(`streaming/mediaInfos/${id}`); }
        }

        // ─── Hooks ──────────────────────────────────────────────────
        function useLocalStorage(key, defaultValue) {
            const [value, setValue] = useState(() => {
                try {
                    const stored = localStorage.getItem(key);
                    return stored ? JSON.parse(stored) : defaultValue;
                } catch { return defaultValue; }
            });

            useEffect(() => {
                try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
            }, [key, value]);

            return [value, setValue];
        }

        // ─── Icons ──────────────────────────────────────────────────
        function Icon({ name, size = 18, className = '' }) {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && lucide[name]) {
                    ref.current.innerHTML = '';
                    const svg = lucide.createElement(lucide[name]);
                    svg.setAttribute('width', size);
                    svg.setAttribute('height', size);
                    if (className) svg.setAttribute('class', className);
                    ref.current.appendChild(svg);
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center" />;
        }

        // ─── Toast ──────────────────────────────────────────────────
        function Toast({ message, type = 'info', onClose }) {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const colors = {
                success: 'bg-emerald-500/20 border-emerald-500/50 text-emerald-300',
                error: 'bg-red-500/20 border-red-500/50 text-red-300',
                info: 'bg-rd-500/20 border-rd-500/50 text-rd-300',
            };

            return (
                <div className={`fixed top-4 right-4 z-50 px-4 py-3 rounded-lg border ${colors[type]} animate-fade-in flex items-center gap-2 max-w-md`}>
                    <Icon name={type === 'success' ? 'Check' : type === 'error' ? 'AlertCircle' : 'Info'} size={16} />
                    <span className="text-sm">{message}</span>
                </div>
            );
        }

        // ─── Format Helpers ─────────────────────────────────────────
        function formatBytes(bytes) {
            if (!bytes) return '0 B';
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(i > 1 ? 2 : 0) + ' ' + sizes[i];
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function timeAgo(dateStr) {
            const diff = Date.now() - new Date(dateStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        // ─── Token Setup Screen ─────────────────────────────────────
        function TokenSetup({ onConnect, loading, error }) {
            const [token, setToken] = useState('');
            const [showToken, setShowToken] = useState(false);

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="w-full max-w-md animate-fade-in">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-rd-500/10 border border-rd-500/20 mb-4">
                                <Icon name="Unlock" size={28} className="text-rd-400" />
                            </div>
                            <h1 className="text-2xl font-bold text-white mb-2">Real-Debrid</h1>
                            <p className="text-neutral-400 text-sm">Enter your API token to get started</p>
                        </div>

                        <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-6 space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-neutral-300 mb-2">API Token</label>
                                <div className="relative">
                                    <input
                                        type={showToken ? 'text' : 'password'}
                                        value={token}
                                        onChange={e => setToken(e.target.value)}
                                        placeholder="Paste your token here..."
                                        className="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-4 py-3 pr-10 text-sm text-white placeholder-neutral-500 focus:outline-none focus:border-rd-500 focus:ring-1 focus:ring-rd-500/30 transition"
                                        onKeyDown={e => e.key === 'Enter' && token.trim() && onConnect(token.trim())}
                                    />
                                    <button
                                        onClick={() => setShowToken(!showToken)}
                                        className="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-500 hover:text-neutral-300 transition"
                                    >
                                        <Icon name={showToken ? 'EyeOff' : 'Eye'} size={16} />
                                    </button>
                                </div>
                            </div>

                            {error && (
                                <div className="bg-red-500/10 border border-red-500/30 rounded-lg px-3 py-2 text-red-400 text-sm">
                                    {error}
                                </div>
                            )}

                            <button
                                onClick={() => token.trim() && onConnect(token.trim())}
                                disabled={!token.trim() || loading}
                                className="w-full bg-rd-600 hover:bg-rd-700 disabled:bg-neutral-700 disabled:text-neutral-500 text-white font-medium rounded-lg px-4 py-3 text-sm transition flex items-center justify-center gap-2"
                            >
                                {loading ? (
                                    <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full spinner" /> Connecting...</>
                                ) : (
                                    <><Icon name="LogIn" size={16} /> Connect</>
                                )}
                            </button>

                            <a
                                href="https://real-debrid.com/apitoken"
                                target="_blank"
                                rel="noopener noreferrer"
                                className="block text-center text-xs text-neutral-500 hover:text-rd-400 transition"
                            >
                                Get your API token from real-debrid.com/apitoken
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Header / User Bar ──────────────────────────────────────
        function Header({ user, activeTab, setActiveTab, onDisconnect }) {
            const tabs = [
                { id: 'unrestrict', label: 'Unrestrict', icon: 'Unlock' },
                { id: 'stream', label: 'Stream', icon: 'Play' },
                { id: 'hosts', label: 'Hosts', icon: 'Server' },
            ];

            return (
                <header className="sticky top-0 z-40 bg-neutral-950/80 backdrop-blur-xl border-b border-neutral-800/50">
                    <div className="max-w-5xl mx-auto px-4">
                        <div className="flex items-center justify-between h-14">
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-2">
                                    <div className="w-7 h-7 rounded-lg bg-rd-500/20 flex items-center justify-center">
                                        <Icon name="Unlock" size={14} className="text-rd-400" />
                                    </div>
                                    <span className="font-semibold text-white text-sm">Debrid</span>
                                </div>

                                <nav className="flex items-center gap-1">
                                    {tabs.map(tab => (
                                        <button
                                            key={tab.id}
                                            onClick={() => setActiveTab(tab.id)}
                                            className={`px-3 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1.5 ${
                                                activeTab === tab.id
                                                    ? 'bg-neutral-800 text-white'
                                                    : 'text-neutral-400 hover:text-neutral-200 hover:bg-neutral-800/50'
                                            }`}
                                        >
                                            <Icon name={tab.icon} size={14} />
                                            {tab.label}
                                        </button>
                                    ))}
                                </nav>
                            </div>

                            <div className="flex items-center gap-3">
                                {user && (
                                    <div className="flex items-center gap-2 text-sm">
                                        <span className="text-neutral-400">{user.username}</span>
                                        {user.type === 'premium' && (
                                            <span className="px-1.5 py-0.5 bg-amber-500/20 text-amber-400 text-xs rounded font-medium">PRO</span>
                                        )}
                                    </div>
                                )}
                                <button
                                    onClick={onDisconnect}
                                    className="text-neutral-500 hover:text-red-400 transition p-1"
                                    title="Disconnect"
                                >
                                    <Icon name="LogOut" size={16} />
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        // ─── Unrestrict View ────────────────────────────────────────
        function UnrestrictView({ client, history, setHistory, onStream }) {
            const [link, setLink] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');
            const [toast, setToast] = useState(null);
            const inputRef = useRef(null);

            useEffect(() => { inputRef.current?.focus(); }, []);

            const handleUnrestrict = useCallback(async () => {
                if (!link.trim()) return;
                setLoading(true);
                setError('');
                setResult(null);

                try {
                    const data = await client.unrestrictLink(link.trim(), password || undefined);
                    setResult(data);
                    setLink('');
                    setPassword('');
                    setShowPassword(false);

                    // Add to history
                    const entry = {
                        id: data.id,
                        filename: data.filename,
                        filesize: data.filesize,
                        download: data.download,
                        streamable: data.streamable,
                        mimeType: data.mimeType,
                        host: data.host,
                        date: new Date().toISOString(),
                    };
                    setHistory(prev => [entry, ...prev].slice(0, 50));
                } catch (err) {
                    setError(err.message || 'Failed to unrestrict link');
                } finally {
                    setLoading(false);
                }
            }, [link, password, client, setHistory]);

            const copyUrl = useCallback((url) => {
                navigator.clipboard.writeText(url);
                setToast({ message: 'URL copied to clipboard', type: 'success' });
            }, []);

            return (
                <div className="space-y-6">
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}

                    {/* Input Section */}
                    <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-5 space-y-3">
                        <div className="relative">
                            <input
                                ref={inputRef}
                                type="text"
                                value={link}
                                onChange={e => setLink(e.target.value)}
                                placeholder="Paste a link from a supported host..."
                                className="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-4 py-3 text-sm text-white placeholder-neutral-500 focus:outline-none focus:border-rd-500 focus:ring-1 focus:ring-rd-500/30 transition"
                                onKeyDown={e => e.key === 'Enter' && !loading && handleUnrestrict()}
                            />
                        </div>

                        {/* Password toggle */}
                        <div className="flex items-center gap-2">
                            <button
                                onClick={() => setShowPassword(!showPassword)}
                                className="text-xs text-neutral-500 hover:text-neutral-300 transition flex items-center gap-1"
                            >
                                <Icon name={showPassword ? 'ChevronUp' : 'ChevronDown'} size={12} />
                                Password protected?
                            </button>
                        </div>

                        {showPassword && (
                            <input
                                type="text"
                                value={password}
                                onChange={e => setPassword(e.target.value)}
                                placeholder="Link password (optional)"
                                className="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-4 py-2.5 text-sm text-white placeholder-neutral-500 focus:outline-none focus:border-rd-500 transition animate-fade-in"
                            />
                        )}

                        <button
                            onClick={handleUnrestrict}
                            disabled={!link.trim() || loading}
                            className="w-full bg-rd-600 hover:bg-rd-700 disabled:bg-neutral-700 disabled:text-neutral-500 text-white font-medium rounded-lg px-4 py-3 text-sm transition flex items-center justify-center gap-2"
                        >
                            {loading ? (
                                <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full spinner" /> Unrestricting...</>
                            ) : (
                                <><Icon name="Unlock" size={16} /> Unrestrict</>
                            )}
                        </button>

                        {error && (
                            <div className="bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-3 text-red-400 text-sm animate-fade-in">
                                {error}
                            </div>
                        )}
                    </div>

                    {/* Result Card */}
                    {result && <ResultCard result={result} onCopy={copyUrl} onStream={onStream} />}

                    {/* History */}
                    {history.length > 0 && (
                        <div className="space-y-3">
                            <div className="flex items-center justify-between">
                                <h3 className="text-sm font-medium text-neutral-400 flex items-center gap-2">
                                    <Icon name="History" size={14} /> Recent ({history.length})
                                </h3>
                                <button
                                    onClick={() => setHistory([])}
                                    className="text-xs text-neutral-600 hover:text-red-400 transition"
                                >
                                    Clear all
                                </button>
                            </div>
                            <div className="space-y-2">
                                {history.map((item, i) => (
                                    <HistoryItem key={item.id + '-' + i} item={item} onCopy={copyUrl} onStream={onStream} />
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ─── Result Card ────────────────────────────────────────────
        function ResultCard({ result, onCopy, onStream }) {
            return (
                <div className="bg-neutral-900 border border-rd-500/30 rounded-xl p-5 animate-fade-in pulse-border space-y-4">
                    <div className="flex items-start gap-3">
                        <div className="w-10 h-10 rounded-lg bg-emerald-500/10 flex items-center justify-center flex-shrink-0 mt-0.5">
                            <Icon name="CheckCircle" size={20} className="text-emerald-400" />
                        </div>
                        <div className="min-w-0 flex-1">
                            <h3 className="text-white font-medium text-sm truncate" title={result.filename}>
                                {result.filename}
                            </h3>
                            <div className="flex items-center gap-3 mt-1 text-xs text-neutral-400">
                                <span>{formatBytes(result.filesize)}</span>
                                {result.mimeType && <span>{result.mimeType}</span>}
                                {result.host && <span>{result.host}</span>}
                            </div>
                        </div>
                    </div>

                    <div className="flex items-center gap-2">
                        <a
                            href={result.download}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg px-4 py-2.5 text-sm transition flex items-center justify-center gap-2"
                        >
                            <Icon name="Download" size={16} /> Download
                        </a>
                        {result.streamable === 1 && (
                            <button
                                onClick={() => onStream(result)}
                                className="flex-1 bg-rd-600 hover:bg-rd-700 text-white font-medium rounded-lg px-4 py-2.5 text-sm transition flex items-center justify-center gap-2"
                            >
                                <Icon name="Play" size={16} /> Stream
                            </button>
                        )}
                        <button
                            onClick={() => onCopy(result.download)}
                            className="bg-neutral-800 hover:bg-neutral-700 text-neutral-300 rounded-lg px-3 py-2.5 transition"
                            title="Copy URL"
                        >
                            <Icon name="Copy" size={16} />
                        </button>
                    </div>
                </div>
            );
        }

        // ─── History Item ───────────────────────────────────────────
        function HistoryItem({ item, onCopy, onStream }) {
            return (
                <div className="bg-neutral-900/50 border border-neutral-800/50 rounded-lg px-4 py-3 flex items-center gap-3 hover:border-neutral-700 transition group">
                    <div className="w-8 h-8 rounded-lg bg-neutral-800 flex items-center justify-center flex-shrink-0">
                        <Icon name={item.streamable ? 'Film' : 'File'} size={14} className="text-neutral-400" />
                    </div>
                    <div className="min-w-0 flex-1">
                        <p className="text-sm text-neutral-200 truncate">{item.filename}</p>
                        <div className="flex items-center gap-2 text-xs text-neutral-500">
                            <span>{formatBytes(item.filesize)}</span>
                            <span>{timeAgo(item.date)}</span>
                        </div>
                    </div>
                    <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition">
                        <a
                            href={item.download}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="p-1.5 text-neutral-400 hover:text-emerald-400 transition"
                            title="Download"
                        >
                            <Icon name="Download" size={14} />
                        </a>
                        {item.streamable === 1 && (
                            <button
                                onClick={() => onStream(item)}
                                className="p-1.5 text-neutral-400 hover:text-rd-400 transition"
                                title="Stream"
                            >
                                <Icon name="Play" size={14} />
                            </button>
                        )}
                        <button
                            onClick={() => onCopy(item.download)}
                            className="p-1.5 text-neutral-400 hover:text-white transition"
                            title="Copy URL"
                        >
                            <Icon name="Copy" size={14} />
                        </button>
                    </div>
                </div>
            );
        }

        // ─── Stream View ────────────────────────────────────────────
        function StreamView({ client, streamItem, setStreamItem }) {
            const [transcodeData, setTranscodeData] = useState(null);
            const [mediaInfo, setMediaInfo] = useState(null);
            const [selectedQuality, setSelectedQuality] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const videoRef = useRef(null);

            useEffect(() => {
                if (!streamItem?.id) return;
                let cancelled = false;
                setLoading(true);
                setError('');
                setTranscodeData(null);
                setMediaInfo(null);
                setSelectedQuality(null);

                (async () => {
                    try {
                        const [transcode, info] = await Promise.allSettled([
                            client.getTranscode(streamItem.id),
                            client.getMediaInfo(streamItem.id),
                        ]);

                        if (cancelled) return;

                        if (transcode.status === 'fulfilled') {
                            setTranscodeData(transcode.value);
                            // Auto-select best quality
                            const qualities = getQualities(transcode.value);
                            if (qualities.length > 0) setSelectedQuality(qualities[0]);
                        }
                        if (info.status === 'fulfilled') {
                            setMediaInfo(info.value);
                        }
                        if (transcode.status === 'rejected') {
                            setError('Could not load transcode options. Try opening the download URL directly.');
                        }
                    } catch (err) {
                        if (!cancelled) setError(err.message);
                    } finally {
                        if (!cancelled) setLoading(false);
                    }
                })();

                return () => { cancelled = true; };
            }, [streamItem?.id, client]);

            function getQualities(data) {
                if (!data) return [];
                const qualities = [];
                // Prefer liveMP4 (most compatible with HTML5 video), then others
                const formats = ['liveMP4', 'h264WebM', 'apple', 'dash'];
                for (const fmt of formats) {
                    if (data[fmt]) {
                        for (const [quality, info] of Object.entries(data[fmt])) {
                            qualities.push({
                                format: fmt,
                                quality,
                                url: info.url || info,
                                label: `${quality} (${fmt})`,
                            });
                        }
                    }
                }
                return qualities;
            }

            const qualities = useMemo(() => getQualities(transcodeData), [transcodeData]);

            if (!streamItem) {
                return (
                    <div className="flex flex-col items-center justify-center py-20 text-neutral-500">
                        <Icon name="Play" size={48} className="mb-4 text-neutral-700" />
                        <p className="text-sm">No stream selected</p>
                        <p className="text-xs mt-1">Unrestrict a streamable link first, then click "Stream"</p>
                    </div>
                );
            }

            return (
                <div className="space-y-4 animate-fade-in">
                    {/* File Info */}
                    <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-4">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3 min-w-0">
                                <div className="w-10 h-10 rounded-lg bg-rd-500/10 flex items-center justify-center flex-shrink-0">
                                    <Icon name="Film" size={18} className="text-rd-400" />
                                </div>
                                <div className="min-w-0">
                                    <h3 className="text-white font-medium text-sm truncate">{streamItem.filename}</h3>
                                    <p className="text-xs text-neutral-400">{formatBytes(streamItem.filesize)}</p>
                                </div>
                            </div>
                            <button
                                onClick={() => setStreamItem(null)}
                                className="text-neutral-500 hover:text-neutral-300 transition p-1"
                            >
                                <Icon name="X" size={16} />
                            </button>
                        </div>
                    </div>

                    {loading && (
                        <div className="flex items-center justify-center py-12">
                            <div className="w-8 h-8 border-2 border-rd-500/30 border-t-rd-500 rounded-full spinner" />
                        </div>
                    )}

                    {error && (
                        <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 space-y-3">
                            <p className="text-red-400 text-sm">{error}</p>
                            <a
                                href={streamItem.download}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="inline-flex items-center gap-2 bg-neutral-800 hover:bg-neutral-700 text-white rounded-lg px-4 py-2 text-sm transition"
                            >
                                <Icon name="ExternalLink" size={14} /> Open in new tab
                            </a>
                        </div>
                    )}

                    {/* Quality Selector */}
                    {qualities.length > 0 && (
                        <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-4">
                            <label className="block text-xs font-medium text-neutral-400 mb-2">Quality</label>
                            <select
                                value={selectedQuality ? `${selectedQuality.format}-${selectedQuality.quality}` : ''}
                                onChange={e => {
                                    const q = qualities.find(q => `${q.format}-${q.quality}` === e.target.value);
                                    setSelectedQuality(q);
                                }}
                                className="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-rd-500 transition"
                            >
                                {qualities.map(q => (
                                    <option key={`${q.format}-${q.quality}`} value={`${q.format}-${q.quality}`}>
                                        {q.label}
                                    </option>
                                ))}
                            </select>
                        </div>
                    )}

                    {/* Video Player */}
                    {selectedQuality && (
                        <div className="bg-black rounded-xl overflow-hidden border border-neutral-800">
                            <video
                                ref={videoRef}
                                key={selectedQuality.url}
                                src={selectedQuality.url}
                                controls
                                autoPlay
                                className="w-full max-h-[70vh]"
                                onError={() => setError('Playback failed. The stream URL may have expired or is not compatible with browser playback.')}
                            />
                        </div>
                    )}

                    {/* Fallback + Direct Link */}
                    {selectedQuality && (
                        <div className="flex items-center gap-2">
                            <a
                                href={selectedQuality.url}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="flex-1 bg-neutral-800 hover:bg-neutral-700 text-neutral-300 rounded-lg px-4 py-2.5 text-sm transition flex items-center justify-center gap-2"
                            >
                                <Icon name="ExternalLink" size={14} /> Open stream in new tab
                            </a>
                            <a
                                href={streamItem.download}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="flex-1 bg-neutral-800 hover:bg-neutral-700 text-neutral-300 rounded-lg px-4 py-2.5 text-sm transition flex items-center justify-center gap-2"
                            >
                                <Icon name="Download" size={14} /> Direct download
                            </a>
                        </div>
                    )}

                    {/* Media Info */}
                    {mediaInfo && (
                        <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-4">
                            <h4 className="text-xs font-medium text-neutral-400 mb-3">Media Info</h4>
                            <div className="grid grid-cols-2 gap-2 text-sm">
                                {mediaInfo.video && Object.entries(mediaInfo.video).map(([key, val]) => (
                                    typeof val === 'string' || typeof val === 'number' ? (
                                        <div key={key}>
                                            <span className="text-neutral-500 text-xs">{key}</span>
                                            <p className="text-neutral-200">{val}</p>
                                        </div>
                                    ) : null
                                ))}
                                {mediaInfo.audio && Object.entries(mediaInfo.audio).map(([key, val]) => (
                                    typeof val === 'string' || typeof val === 'number' ? (
                                        <div key={key}>
                                            <span className="text-neutral-500 text-xs">{key}</span>
                                            <p className="text-neutral-200">{val}</p>
                                        </div>
                                    ) : null
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ─── Hosts View ─────────────────────────────────────────────
        function HostsView({ client }) {
            const [hosts, setHosts] = useState(null);
            const [search, setSearch] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');

            useEffect(() => {
                let cancelled = false;
                (async () => {
                    try {
                        const data = await client.getHosts();
                        if (!cancelled) setHosts(data);
                    } catch (err) {
                        if (!cancelled) setError(err.message);
                    } finally {
                        if (!cancelled) setLoading(false);
                    }
                })();
                return () => { cancelled = true; };
            }, [client]);

            const filteredHosts = useMemo(() => {
                if (!hosts) return [];
                const entries = Object.entries(hosts);
                if (!search.trim()) return entries;
                const q = search.toLowerCase();
                return entries.filter(([key, val]) =>
                    key.toLowerCase().includes(q) || (val.name && val.name.toLowerCase().includes(q))
                );
            }, [hosts, search]);

            if (loading) {
                return (
                    <div className="flex items-center justify-center py-20">
                        <div className="w-8 h-8 border-2 border-rd-500/30 border-t-rd-500 rounded-full spinner" />
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 text-red-400 text-sm">
                        {error}
                    </div>
                );
            }

            return (
                <div className="space-y-4">
                    <div className="relative">
                        <Icon name="Search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-500" />
                        <input
                            type="text"
                            value={search}
                            onChange={e => setSearch(e.target.value)}
                            placeholder="Search hosts..."
                            className="w-full bg-neutral-900 border border-neutral-800 rounded-lg pl-10 pr-4 py-2.5 text-sm text-white placeholder-neutral-500 focus:outline-none focus:border-rd-500 transition"
                        />
                    </div>

                    <div className="text-xs text-neutral-500">{filteredHosts.length} hosts</div>

                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2">
                        {filteredHosts.map(([key, val]) => (
                            <div
                                key={key}
                                className="bg-neutral-900 border border-neutral-800 rounded-lg p-3 hover:border-neutral-700 transition"
                            >
                                <div className="flex items-center gap-2">
                                    {val.image ? (
                                        <img src={val.image} alt="" className="w-5 h-5 rounded" onError={e => e.target.style.display='none'} />
                                    ) : (
                                        <div className="w-5 h-5 rounded bg-neutral-800 flex items-center justify-center">
                                            <Icon name="Globe" size={10} className="text-neutral-500" />
                                        </div>
                                    )}
                                    <span className="text-sm text-neutral-200 truncate">{val.name || key}</span>
                                </div>
                                {val.status !== undefined && (
                                    <div className={`mt-1.5 text-xs ${val.status === 'up' || val.supported === 1 ? 'text-emerald-400' : 'text-neutral-500'}`}>
                                        {val.status === 'up' || val.supported === 1 ? 'Supported' : val.status || 'Unknown'}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ─── App ────────────────────────────────────────────────────
        function App() {
            const [token, setToken] = useLocalStorage('rd_api_token', '');
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('unrestrict');
            const [history, setHistory] = useLocalStorage('rd_history', []);
            const [streamItem, setStreamItem] = useState(null);
            const [connecting, setConnecting] = useState(false);
            const [connectError, setConnectError] = useState('');

            const client = useMemo(() => token ? new RDClient(token) : null, [token]);

            // Auto-connect on load if token exists
            useEffect(() => {
                if (!token || user) return;
                let cancelled = false;
                (async () => {
                    try {
                        const userData = await new RDClient(token).getUser();
                        if (!cancelled) setUser(userData);
                    } catch {
                        // Token might be expired, don't auto-clear - let user retry
                        if (!cancelled) setToken('');
                    }
                })();
                return () => { cancelled = true; };
            }, []);

            const handleConnect = useCallback(async (newToken) => {
                setConnecting(true);
                setConnectError('');
                try {
                    const userData = await new RDClient(newToken).getUser();
                    setUser(userData);
                    setToken(newToken);
                } catch (err) {
                    setConnectError(err.status === 401 ? 'Invalid token. Please check and try again.' : err.message);
                } finally {
                    setConnecting(false);
                }
            }, [setToken]);

            const handleDisconnect = useCallback(() => {
                setToken('');
                setUser(null);
                setStreamItem(null);
            }, [setToken]);

            const handleStream = useCallback((item) => {
                setStreamItem(item);
                setActiveTab('stream');
            }, []);

            // Not connected
            if (!user) {
                return <TokenSetup onConnect={handleConnect} loading={connecting} error={connectError} />;
            }

            return (
                <div className="min-h-screen">
                    <Header
                        user={user}
                        activeTab={activeTab}
                        setActiveTab={setActiveTab}
                        onDisconnect={handleDisconnect}
                    />
                    <main className="max-w-3xl mx-auto px-4 py-6">
                        {activeTab === 'unrestrict' && (
                            <UnrestrictView
                                client={client}
                                history={history}
                                setHistory={setHistory}
                                onStream={handleStream}
                            />
                        )}
                        {activeTab === 'stream' && (
                            <StreamView
                                client={client}
                                streamItem={streamItem}
                                setStreamItem={setStreamItem}
                            />
                        )}
                        {activeTab === 'hosts' && (
                            <HostsView client={client} />
                        )}
                    </main>
                </div>
            );
        }

        // ─── Mount ──────────────────────────────────────────────────
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
